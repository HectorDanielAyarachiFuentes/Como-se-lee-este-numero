<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector de Números</title>
    <meta name="description" content="Aplicación web para leer números en español con modos de aprendizaje fonético y formal gráfico.">
    <meta name="keywords" content="números, lectura, fonético, formal, aprendizaje, español, educación">
    <meta name="author" content="Tu Nombre o Equipo">
    <meta name="robots" content="index, follow">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🔢</text></svg>">
  <link rel="stylesheet" href="scss/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      /* ── Desglose Fonético ── */
      .phonetic-box {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5em;
        padding: 0.75em 1em;
        min-height: 3.5em;
        background: rgba(0,0,0,0.35);
        border-radius: 8px;
      }

      /* Grupo de sílabas que forman una palabra */
      .phonetic-word-group {
        display: inline-flex;
        align-items: center;
        gap: 2px;
      }

      /* Chip individual de sílaba */
      .silaba-chip {
        display: inline-block;
        padding: 0.25em 0.55em;
        border-radius: 5px;
        font-family: 'Roboto Mono', monospace;
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease, color 0.15s ease;
        cursor: default;
        user-select: none;
        border: 1px solid rgba(255,255,255,0.15);
      }

      /* Color A (posiciones pares dentro de la palabra) */
      .silaba-chip[data-syl-color="a"] {
        background: rgba(255,255,255,0.18);
        color: #fff;
      }

      /* Color B (posiciones impares dentro de la palabra) */
      .silaba-chip[data-syl-color="b"] {
        background: rgba(255,255,255,0.08);
        color: rgba(255,255,255,0.85);
      }

      /* Estado resaltado durante la reproducción */
      .silaba-chip--highlight {
        background: #f6ad55 !important;
        color: #1a202c !important;
        transform: scale(1.18) translateY(-2px);
        box-shadow: 0 4px 12px rgba(246, 173, 85, 0.55);
        border-color: #ed8936;
        z-index: 1;
      }

      /* Separador visual entre palabras */
      .phonetic-word-sep {
        display: inline-block;
        width: 0.5em;
      }

      @media (max-width: 576px) {
        .silaba-chip { font-size: 0.95rem; }
      }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Lector de Números</h1>
            <p>Introduce un número (con o sin decimales) y explora sus diferentes lecturas.</p>
        </header>

        <div class="card contenedor">
    <label for="numero">Introduce el número:</label>
    <input type="text" id="numero" placeholder="Ej: 1234,56" autocomplete="off">
  </div>

        <div class="card">
            <h2>Lectura Simple</h2>
            <div id="resultado" class="result-box">
                <span class="placeholder-text">La lectura del número aparecerá aquí.</span>
            </div>
            <button id="play-simple-btn" class="play-btn">▶️ <span>Escuchar</span></button>
        </div>

        <div class="card">
            <h2>Modo de Aprendizaje Fonético</h2>
            <div id="aprendizaje-fonetico-resultado" class="result-box phonetic-box">
                 <span class="placeholder-text">Desglose fonético...</span>
            </div>
            <button id="play-phonetic-btn" class="play-btn">▶️ <span>Escuchar y Resaltar</span></button>
        </div>

        <div class="card">
            <h2>Modo de Aprendizaje Formal (Gráfico)</h2>
            <div id="aprendizaje-formal-wrapper" class="result-box svg-box">
                 <span class="placeholder-text">Representación gráfica...</span>
            </div>
            <button id="play-formal-btn" class="play-btn">▶️ <span>Escuchar y Resaltar</span></button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
    <script type="module" src="theme-generator.js"></script>
</body>
</html>
